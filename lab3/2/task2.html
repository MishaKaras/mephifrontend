<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Задание 2</title>
    <style>
        .label {
            font-size: 48px;
            font-weight: bold;
            text-align: center;
            margin-top: 100px;
        }

        .desktop, .tablet, .mobile {
            display: none;
        }

        @media (min-width: 1024px) {
            .desktop { display: block; color: blue; }
        }

        @media (min-width: 769px) and (max-width: 1023px) {
            .tablet { display: block; color: green; }
        }

        @media (max-width: 768px) {
            .mobile { display: block; color: red; }
        }
    </style>
</head>
<body>
    <div class="label desktop">Desktop</div>
    <div class="label tablet">Tablet</div>
    <div class="label mobile">Mobile</div>
</body>
</html>
